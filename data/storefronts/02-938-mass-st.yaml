locationName: "The Livingroom Collective"
address1: "938 Massachusetts St"
address2: "Lawrence, KS 66044"
hoursHeading: "<i>Grand Opening July 31 (Final Friday) from 5 to 9pm!</i>"
photo: "/images/storefronts/livingroomCollective/LivingroomCollective.jpg"
blurb: "Imagine a community-centered, warm and inviting 1,600 square foot living room space. Come hang out, share, chat, participate and even purchase art! Immerse yourself in the environment while the artists create their work."
artists:
  - name: "Kim Brook"
    image: "/images/2018-08-10_17-44-12_UTC.jpg"
    bio: " Kim is a Visual Artist, Arts Educator, and Community Visionary. In all of her projects and endeavors, she prioritizes fostering and creating community bonds."
    links:
      - label: "Instagram"
        url: "https://www.instagram.com/kimbrookceramics/"

  - name: "Lauren Bass"
    image: "/images/2019-07-04_02-30-04_UTC.jpg"
    bio: "Kansas-raised artist Lauren Bass is a Kansas-raised artist graduated from KU in 2022 with a BA in Film & Media Studies, Environmental Studies, and a minor in Visual Art. Through her work in oil paint, charcoal, and ink, she explores the figural and temporal aspects of the natural world."
    links:
      - label: "Website"
        emoji: "🌐"
        url: "https://basslauren.myportfolio.com/painting"
      - label: "Instagram"
        url: "https://www.instagram.com/laurenbass_art/"
  - name: "Lane Eisenbart"
    image: "/images/2019-07-09_18-51-26_UTC.jpg"
    bio: "If we <b>had</b> to classify Lane's art, we might say they are a fiber and jewelry artist. They sew and upcycle mostly clothing for sale on their depop and Etsy. Sometimes that means sewing, cutting, embellishing, stamping, dyeing. Funky, Vintage, beautiful on all bodies are their watch words."
    links:
      - label: "Instagram"
        url: "https://www.instagram.com/ladyironbeard"
  - name: "Ailecia Ruscin"
    image: "/images/2020-01-28_16-50-31_UTC.jpg"
    bio: "Ailecia is the sole proprietor of <i>Oh Snap! Photography</i>, a queer- and woman-owned business. She seeks to authentically connect with individuals, couples and families to make art about their lives that express their identities in vulnerable and intimate ways."
    links:
      - label: "Website"
        emoji: "🌐"
        url: "https://Ohsnaphoto.com"
