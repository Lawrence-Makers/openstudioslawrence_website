baseURL: "https://openstudioslawrence.org"
languageCode: "en-us"
title: "OpenStudios Lawrence"
theme: hugo-profile
outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"
enableRobotsTXT: true
pagination:
  pagerSize: 3
markup:
  goldmark:
    renderer:
      unsafe: true
Menus:
  main:
    - identifier: howitworks
      name: How It Works
      title: How OpenStudios Works
      url: /how-it-works
      weight: 1
    - identifier: FAQ
      name: FAQ
      title: Frequently Asked Questions
      url: /faq
      weight: 5
    - identifier: getinvolved
      name: "Get Involved!"
      title: Get Involved with OpenStudios
      url: "#"
      weight: 8
    - identifier: getinvolved-artist
      name: "I'm an artist!"
      url: /artists
      parent: getinvolved
      weight: 1
    - identifier: getinvolved-landlord
      name: "I'm a landlord!"
      url: /landlords
      parent: getinvolved
      weight: 2
    - identifier: getinvolved-help
      name: "I want to help!"
      url: /get-involved
      parent: getinvolved
      weight: 3
    - identifier: getinvolved-contact
      name: "Contact us"
      url: /contact
      parent: getinvolved
      weight: 4
    - identifier: news
      name: News
      title: News and Announcements
      url: /news
      weight: 7
params:
  title: "OpenStudios Lawrence"
  description: "Animate your storefront. Support local artists.Build vibrant communities."
  favicon: "/OS-blue.svg"
  useBootstrapCDN: false
  mathjax: false
  animate: true
  customCSS: true
  color:
    darkmode:
      primaryColor: "#007bff"
  theme:
    disableThemeToggle: false
  font:
    fontSize: 1rem
    fontWeight: 400
    lineHeight: 1.5
    textAlign: left
  navbar:
    align: ms-auto
    brandName: "OpenStudios Lawrence"
    disableSearch: true
    stickyNavBar:
      enable: true
      showOnScrollUp: false
    enableSeparator: false
    menus:
      disableAbout: true
      disableExperience: true
      disableEducation: true
      disableProjects: true
      disableAchievements: true
      disableContact: true
  hero:
    enable: true
    intro: "Welcome to"
    title: "OpenStudios Lawrence"
    subtitle: "We strengthen Lawrence's art culture by activating empty storefronts with local artists"
    content: "Artists benefit from a free studio for several months. Landlords gain an animated, more attractive space that's easier to rent. Together, we strengthen Lawrence's art culture!"
    image: /images/2020-01-28_16-50-31_UTC.jpg
    bottomImage:
      enable: false
    button:
      enable: true
      name: "Learn More"
      url: "/how-it-works"
      download: false
      newPage: false
  contact:
    enable: false
  footer:
    recentPosts:
      enable: false
    socialNetworks:
      facebook: https://facebook.com/openstudioslawrence
      instagram: https://instagram.com/openstudioslawrence
  listPages:
    disableFeaturedImage: false
  singlePages:
    socialShare: false
    readTime:
      enable: false
      content: "min read"
    scrollprogress:
      enable: true
    tags:
      openInNewTab: true
  terms:
    read: "Read"
    toc: "Table Of Contents"
    copyright: "All rights reserved"
    pageNotFound: "Page not found"
    emailText: "Check out this site"
  datesFormat:
    article: "Jan 2, 2006"
    articleList: "Jan 2, 2006"
    articleRecent: "Jan 2, 2006"
